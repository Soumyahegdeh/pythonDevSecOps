name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
    # Run SCA and Safety checks
  sca_safety:
    name: SCA and Safety
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python Environment
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install Dependencies and safety
        run: |
            if [ -f "app/requirements.txt" ]; then
              python -m pip install --upgrade pip
              pip install safety
              pip install -r app/requirements.txt
            else
              echo "No requirements.txt found, skipping dependency installation."
            fi
     
      
      - name: Run Safety Check
        run: |
            if [ -f "app/requirements.txt" ]; then
                safety check --file=app/requirements.txt --json > safety-report.json || echo "Safety scan completed with issues"
            else
               echo "{}" > safety-report.json
            fi

      - name: Upload Safety Report
        uses: actions/upload-artifact@v4
        with:
          name: safety-scan-report
          path: safety-report.json

    # Run SAST with Bandit       
  sast_bandit:
    name: SAST with Bandit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python Environment
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install Bandit
        run: |
            python -m pip install --upgrade pip
            pip install bandit

      - name: Run Bandit SAST Scan
        run: |
            bandit -r app/ -f json -o bandit-report.json || echo "Bandit scan completed with issues"

      - name: Upload Bandit Report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-scan-report
          path: bandit-report.json   
   
  
  # secret detection using gitleaks
  secret_detection:
    name: Secret Detection with Gitleaks
    runs-on: ubuntu-latest
   
    permissions:
     contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for accurate secret detection

      - name: Scan for secrets with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          #GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
  
          

   # DAST with OWASP ZAP
  dast_zap:
    name: DAST with OWASP ZAP
    runs-on: ubuntu-latest
    needs: [sca_safety, sast_bandit, secret_detection]
    services:
      app:
        image: pygoat/pygoat:latest  # Update with your app's Docker image
        ports:
          - 8000:8000  # Update with your app's port
        options: 
            --health-cmd "curl -f http://localhost:8000/ || exit 1" 
            --health-interval 10s 
            --health-timeout 5s 
            --health-retries 5
    
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Wait for App Service
        run: |
          echo "Waiting for app service to be up..."
          for i in {1..10}; do
            if curl -s http://localhost:8000/ > /dev/null; then
              echo "App service is up."
              exit 0
            fi
            echo "Attempt $i: App service not up yet."
            sleep 5  
            
          done
          exit 1
          

      - name: Setup and Run OWASP ZAP
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:8000' 
          cmd_options: '-a -m 5'
          artifact_name: zap_scan
          allow_issue_writing: true 
          fail_on_threshold: true